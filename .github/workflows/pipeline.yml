name: Export Intelligence Pipeline

on:
  schedule:
    - cron: '0 0 * * 1' # Her Pazartesi gece yarısı otomatik çalışır
  workflow_dispatch: # İsterseniz panelden tek tıkla manuel tetikleyebilirsiniz

jobs:
  run-intelligence:
    runs-on: ubuntu-latest

    steps:
    - name: Repo Kodlarını Çek
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/checkout@v4
      with:
        python-version: '3.11'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Veri Toplama Motorunu Güvenli Çalıştır
      env:
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        TARGET_KEYWORDS: ${{ secrets.TARGET_KEYWORDS }}
        TARGET_REGIONS: ${{ secrets.TARGET_REGIONS }}
      run: |
        python src/maps_engine.py

    - name: Toplanan Verileri Güvenli Depoya Commit Et
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data_vault/
        git commit -m "🤖 Otomatik Sistem: Yeni Hedef Müşteri Verileri Eklendi [$(date +'%Y-%m-%d')]" || exit 0
        git push
