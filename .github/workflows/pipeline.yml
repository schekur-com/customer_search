name: Export Intelligence Pipeline

on:
  workflow_dispatch:
    inputs:
      target_keywords:
        description: 'Aranacak Sektor Kelimeleri'
        required: true
        default: 'industrial valves distributor'
      target_regions:
        description: 'Hedef Ulkeler / Sehirler'
        required: true
        default: 'Germany, Netherlands'
      dynamic_hs_code:
        description: 'Sorgulanacak GTIP / HS Code'
        required: true
        default: '8481.80'
      dynamic_product_desc:
        description: 'Konfimentoda Aranacak Urun Tanimi'
        required: true
        default: 'valves'

jobs:
  run-intelligence-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Repo Kodlarini Cek
      uses: actions/checkout@v4

    - name: Python Ortamini Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Linux PDF Bilesenlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev python3-pip python3-setuptools libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

    - name: Bagimliliklari Yukle
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas weasyprint

    - name: 1. Adim Dinamik Cografi Kesif
      env:
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        TARGET_KEYWORDS: ${{ github.event.inputs.target_keywords }}
        TARGET_REGIONS: ${{ github.event.inputs.target_regions }}
      run: python src/maps_engine.py

    - name: 2. Adim Dinamik Gumruk ve Konsimento Dogrulama
      env:
        CUSTOMS_DATA_TOKEN: ${{ secrets.CUSTOMS_DATA_TOKEN }}
        DYNAMIC_HS_CODE: ${{ github.event.inputs.dynamic_hs_code }}
        DYNAMIC_PRODUCT_DESC: ${{ github.event.inputs.dynamic_product_desc }}
      run: python src/customs_matcher.py

    - name: 3. Adim Raporlama ve Belge Uretimi
      env:
        TARGET_KEYWORDS: ${{ github.event.inputs.target_keywords }}
        DYNAMIC_HS_CODE: ${{ github.event.inputs.dynamic_hs_code }}
        DYNAMIC_PRODUCT_DESC: ${{ github.event.inputs.dynamic_product_desc }}
      run: python src/report_generator.py

    - name: 4. Adim Guncel Verileri Depola
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data_vault/
        git commit -m "🤖 Raporlar Guncellendi" || exit 0
        git push

    - name: 5. Adim Arayuzu Canliya Al
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: data_vault
        branch: gh-pages
